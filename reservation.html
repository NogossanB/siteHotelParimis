<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="L'hôtel parimis cinq étoiles vous propose ses chambres luxueuses, son restaurant avec chef étoilé ainsi qu'un spa pensé pour votre bien être en plein coeur de Paris.">
    <meta name="keywords" content="hotel parimis, hôtel, hotel avenue montaigne, 5 étoiles, paris, parimis, restaurant, restaurant parimis, spa, spa parimis, soins corps, restaurant paris, spa paris, soins paris, chef étoilé, massage, massage paris, haute gastronomie, luxe, design, vue tour eiffel">
    <title>Réservation | Hôtel Parimis 5 étoiles</title>

		<link rel="icon" type="img/png" href="img/Logo.png" />
        <link rel="stylesheet" href="css/reservation.css">
		
		<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
</head>
<body>
   		<div id="container">
		<!--ENTETE-->
			<header id="menu"></header>

		<!--MENU-->
			<nav id="nav"></nav>
						<!--SECTION-->
					
			

			<main>
			<section class="contact-section">
				<h1>Formulaire de réservation</h1>
					<hr>
						<p>L'hôtel Parimis vous offre la possibilité de réserver votre séjour directement par téléphone et mail :</p>
					
			<ul>
           
            <li>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-envelope-fill" viewBox="0 0 16 16">
                <path d="M.05 3.555A2 2 0 0 1 2 2h12a2 2 0 0 1 1.95 1.555L8 8.414zM0 4.697v7.104l5.803-3.558zM6.761 8.83l-6.57 4.027A2 2 0 0 0 2 14h12a2 2 0 0 0 1.808-1.144l-6.57-4.027L8 9.586zm3.436-.586L16 11.801V4.697z"/>
                </svg>
                <a href="mailto://#">contact@parimis.com</a>
            </li>
            <li>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-telephone-fill" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M1.885.511a1.745 1.745 0 0 1 2.61.163L6.29 2.98c.329.423.445.974.315 1.494l-.547 2.19a.68.68 0 0 0 .178.643l2.457 2.457a.68.68 0 0 0 .644.178l2.189-.547a1.75 1.75 0 0 1 1.494.315l2.306 1.794c.829.645.905 1.87.163 2.611l-1.034 1.034c-.74.74-1.846 1.065-2.877.702a18.6 18.6 0 0 1-7.01-4.42 18.6 18.6 0 0 1-4.42-7.009c-.362-1.03-.037-2.137.703-2.877z"/>
                </svg>
                <a href="tel:+05890000111">0-589-0000111</a>
            </li>
			</ul>

			<p>Ou alors par l'intermédiaire de  ce formulaire ci-dessous : </p>
        </section>

				<div class="container2">
    <form class="formulaire" action="#" method="post">
        <div class="form-group">
            <label for="nom">Nom :</label>
            <input type="text" id="nom" name="nom" placeholder="Votre nom.." required>
        </div>
        <div class="form-group">
            <label for="prenom">Prénom :</label>
            <input type="text" id="prenom" name="prenom" placeholder="Votre prénom.." required>
        </div>
        <div class="form-group">
            <label for="email">Email :</label>
            <input type="email" id="email" name="email" placeholder="votre@mail.fr" required>
        </div>
    
        <div class="form-group">
            <label for="telephone">Téléphone :</label>
            <input type="tel" id="telephone" name="telephone" required>
        </div>
        <div class="form-group">
            <label for="Arrivee">Date d'arrivée :</label>
            <input type="date" id="Arrivee" name="Arrivee" min="2025-07-26" required>
        </div>
        <div class="form-group">
            <label for="Depart">Date de départ :</label>
            <input type="date" id="Depart" name="Depart" max="2026-02-27" required>
        </div>
        <div class="form-group">
            <label for="chambre">Catégorie :</label>
            <select name="chambre" id="chambre">
                <option value="" disabled selected>Choisissez une option</option>
                <option value="suite">Suite</option>
                <option value="deluxe">Deluxe</option>
                <option value="confort">Confort</option>
                <option value="classique luxe">Classique</option>
            </select>
        </div>
        <div class="form-group">
            <label for="nb_personne">Nombre de personnes :</label>
            <select name="nb_personne" id="nb_personne">
                <option value="" disabled selected>Nb personnes</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="+4">+4</option>
            </select>
        </div>
        <div class="form-group">
            <button type="submit">Envoyer</button>
        </div>
    </form>
</div>

</main>
		<footer id="footer"></footer>
        </div>
	  <script src="js/include.js"></script>
</body>
</html>
