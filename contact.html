				<div class="contact-section">

      			<h1>Contacter l'hôtel Parimis</h1>
					<hr>
					<p>L'hôtel Parimis vous offre la possibilité de contacter son service clientèle directement par téléphone et mail :</p>
					
			<ul>
           
            <li>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-envelope-fill" viewBox="0 0 16 16">
                <path d="M.05 3.555A2 2 0 0 1 2 2h12a2 2 0 0 1 1.95 1.555L8 8.414zM0 4.697v7.104l5.803-3.558zM6.761 8.83l-6.57 4.027A2 2 0 0 0 2 14h12a2 2 0 0 0 1.808-1.144l-6.57-4.027L8 9.586zm3.436-.586L16 11.801V4.697z"/>
                </svg>
                <a href="mailto://#">contact@parimis.com</a>
            </li>
            <li>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-telephone-fill" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M1.885.511a1.745 1.745 0 0 1 2.61.163L6.29 2.98c.329.423.445.974.315 1.494l-.547 2.19a.68.68 0 0 0 .178.643l2.457 2.457a.68.68 0 0 0 .644.178l2.189-.547a1.75 1.75 0 0 1 1.494.315l2.306 1.794c.829.645.905 1.87.163 2.611l-1.034 1.034c-.74.74-1.846 1.065-2.877.702a18.6 18.6 0 0 1-7.01-4.42 18.6 18.6 0 0 1-4.42-7.009c-.362-1.03-.037-2.137.703-2.877z"/>
                </svg>
                <a href="tel:+05890000111">0-589-0000111</a>
            </li>
			</ul>

			<p>Ou alors en répondant au formulaire de contact ci-dessous : </p>
        </div>
				<div class="container2">
  <form action="#" method="post">

    <label for="fname">Nom * :</label>
    <input type="text" id="fname" name="firstname" placeholder="Votre nom.." required>

    <label for="lname">Prénom * :</label>
    <input type="text" id="lname" name="lastname" placeholder="Votre prénom.." required>

	<label for="mail">Adresse Email * :</label>
    <input type="email" id="mail" name="lastname" placeholder="votre@mail.fr" required>

    <label for="category">Catégorie</label>
    <select id="category" name="category">
        <option value="" disabled selected>Choisissez une option</option>
	<option value="spa">Spa</option>
    <option value="evenements">Évènements</option>
    <option value="chambres">Chambres</option>
	<option value="restaurant">Restaurant</option>
	<option value="autre">Autre</option>

    </select>


    <label for="subject">Votre message</label>
    <textarea id="subject" name="subject"  style="height:200px"></textarea>

    <input type="submit" value="Envoyer">

        </form>
    
    </div>

 <footer id="footer"></footer>
